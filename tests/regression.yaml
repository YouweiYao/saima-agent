# 赛马智能体 - 回归测试用例

tests:
  # ========== 输出验证型用例 ==========
  
  # 1. 合并单元格保持
  - name: "合并单元格保持"
    desc: "验证需求拆分后单元格合并样式保留"
    type: "excel_output_check"
    check_type: "merge_cells"
    source: "business"
    
  # 2. 人天评估（匹配失败的需求）
  - name: "人天评估"
    desc: "验证匹配失败的需求有人天评估，匹配成功为空"
    type: "excel_output_check"
    check_type: "risk_assessment"
    source: "business"
    
  # 3. 过滤规则
  - name: "过滤规则"
    desc: "验证排除的需求类型被正确过滤"
    type: "excel_output_check"
    check_type: "filter"
    source: "business"

  # ========== 代码检查型用例 ==========
  
  # 4. Prompt外部引用
  - name: "Prompt外部引用"
    desc: "验证Prompt不写死在代码中"
    type: "code_check"
    check_type: "import"
    keywords: ["from prompts import", "import prompts"]
    source: "business"
    
  # 5. 阈值可配置
  - name: "阈值可配置"
    desc: "验证匹配度阈值可通过参数配置"
    type: "code_check"
    check_type: "argument"
    keywords: ["--threshold", "threshold="]
    source: "business"
    
  # 6. 需求文件可配置
  - name: "需求文件可配置"
    desc: "验证输入的需求文件可通过参数配置"
    type: "code_check"
    check_type: "argument"
    keywords: ["--input", "input="]
    source: "business"
    
  # 7. 日志控制
  - name: "日志控制"
    desc: "验证可通过参数控制日志输出"
    type: "code_check"
    check_type: "argument"
    keywords: ["--quiet", "--silent"]
    source: "business"
    
  # 8. 状态实时更新
  - name: "状态实时更新"
    desc: "验证3个阶段都会更新状态文件"
    type: "code_check"
    check_type: "status_update"
    keywords: ["match", "risk", "output", "status"]
    source: "business"
